version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: aquabioid
      POSTGRES_PASSWORD: aquasecretpassword
      POSTGRES_DB: aquabioid_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquabioid -d aquabioid_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://aquabioid:aquasecretpassword@db:5432/aquabioid_db
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/results:/app/data/results
      # In production, mount your local NCBI BLAST / SILVA DB here:
      - ./data/blastdb:/app/data/blastdb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  pgdata: